spring:
  application:
    # 应用名称（可通过环境变量覆盖）
    name: ${APP_NAME:woodlin-admin}

  profiles:
    # 运行环境（dev / test / prod）
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    nacos:
      # Nacos Server 地址
      # 示例默认值仅用于本地启动
      server-addr: ${NACOS_SERVER_ADDR:mumuhk.oldletter.cn:8848}

      config:
        # Nacos 命名空间（可填 namespaceId 或 namespace 名称）
        namespace: ${NACOS_NAMESPACE:mumu}

        # 配置分组
        group: ${NACOS_GROUP:DEFAULT_GROUP}

        # 是否开启配置自动刷新
        refresh-enabled: ${NACOS_REFRESH_ENABLED:true}

  config:
    # Spring Boot 2.4+ 官方推荐：通过 config.import 接入配置中心
    import:
      # 公共配置（所有服务共享）
      - optional:nacos:application-${spring.profiles.active}.yml
      # 应用级配置（当前服务私有）
      # - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml

# Sa-Token 配置（本地优先，确保与前端 Authorization Bearer 头兼容）
sa-token:
  # Token 名称（对应前端 Authorization 头）
  token-name: Authorization
  # Token 前缀（前端发送 Bearer xxx）
  token-prefix: Bearer
  # 从 Header 中读取 Token
  is-read-header: true
  # 不从 Cookie 中读取 Token（前后端分离场景）
  is-read-cookie: false
  # 是否输出操作日志
  is-log: true
  # Token 有效期（秒）：30天
  timeout: 2592000
  # Token 活动超时（-1 表示不限制）
  active-timeout: -1
  # 是否允许同一账号并发登录
  is-concurrent: true
  # 在多人登录同一账号时，是否共享一个 Token
  is-share: false
  # Token 风格：uuid / simple-uuid / random-32 / random-64 / random-128 / tik
  token-style: uuid
  # 是否自动续签（true: 每次访问自动续期）
  auto-renew: true
